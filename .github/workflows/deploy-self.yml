name: Build and Self-Update Main Center

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Self-Update Webhook
        env:
          MAIN_CENTER_URL: ${{ secrets.MAIN_CENTER_URL }}
          AGENT_SECRET_TOKEN: ${{ secrets.AGENT_SECRET_TOKEN }}
        run: |
          echo "Triggering self-update webhook at $MAIN_CENTER_URL/self-update"
          curl -X POST "$MAIN_CENTER_URL/self-update" \
               -H "Authorization: Bearer $AGENT_SECRET_TOKEN" \
               -H "Content-Type: application/json"
